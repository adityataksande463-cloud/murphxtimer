<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gargantua - Interstellar Black Hole | Realistic Accretion Disk</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 18px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 1px;
            border-left: 3px solid #ff5500;
        }
        #controls-note {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255,255,255,0.6);
            background: rgba(0,0,0,0.4);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="info">
        <strong>🌀 GARGANTUA</strong> | Supermassive Black Hole | Horizontal Accretion Disk | Swirling Dust Particles
    </div>
    <div id="controls-note">
        🖱️ Drag to orbit | Scroll to zoom
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // --- Setup Scene, Camera, Renderer ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010114);
        scene.fog = new THREE.FogExp2(0x010114, 0.0006);

        // Camera positioned to look at the disk from an angle (like the movie)
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4.5, 2.2, 6.5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.3;
        document.body.appendChild(renderer.domElement);

        // --- Post Processing: Bloom for intense glow ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.3, 0.4, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 1.2;
        bloomPass.radius = 0.7;
        
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);

        // --- Controls ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.0;
        controls.rotateSpeed = 0.8;
        controls.target.set(0, 0, 0);
        
        // --- Starfield Background (deep space) ---
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 4000;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            const radius = 180 + Math.random() * 350;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starPositions[i*3] = radius * Math.sin(phi) * Math.cos(theta);
            starPositions[i*3+1] = radius * Math.sin(phi) * Math.sin(theta);
            starPositions[i*3+2] = radius * Math.cos(phi);
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.22,
            transparent: true,
            opacity: 0.7,
            blending: THREE.AdditiveBlending
        });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        const starGeometry2 = new THREE.BufferGeometry();
        const starCount2 = 2500;
        const starPositions2 = new Float32Array(starCount2 * 3);
        for (let i = 0; i < starCount2; i++) {
            starPositions2[i*3] = (Math.random() - 0.5) * 600;
            starPositions2[i*3+1] = (Math.random() - 0.5) * 400;
            starPositions2[i*3+2] = (Math.random() - 0.5) * 250 - 100;
        }
        starGeometry2.setAttribute('position', new THREE.BufferAttribute(starPositions2, 3));
        const starMaterial2 = new THREE.PointsMaterial({
            color: 0xaaccff,
            size: 0.12,
            transparent: true,
            opacity: 0.5,
            blending: THREE.AdditiveBlending
        });
        const stars2 = new THREE.Points(starGeometry2, starMaterial2);
        scene.add(stars2);
        
        // --- Black Hole Core (Event Horizon) ---
        const coreGeometry = new THREE.SphereGeometry(0.95, 128, 128);
        const coreMaterial = new THREE.MeshStandardMaterial({
            color: 0x000000,
            roughness: 0.2,
            metalness: 0.95,
            emissive: 0x220000,
            emissiveIntensity: 0.2
        });
        const blackHoleCore = new THREE.Mesh(coreGeometry, coreMaterial);
        scene.add(blackHoleCore);
        
        // Inner photon ring (thin glowing ring)
        const photonRingGeo = new THREE.TorusGeometry(1.06, 0.045, 128, 200);
        const photonMaterial = new THREE.MeshStandardMaterial({
            color: 0xff7700,
            emissive: 0xff4400,
            emissiveIntensity: 1.3,
            transparent: true,
            blending: THREE.AdditiveBlending
        });
        const photonRing = new THREE.Mesh(photonRingGeo, photonMaterial);
        scene.add(photonRing);
        
        // Outer gravitational halo
        const glowHaloGeo = new THREE.SphereGeometry(1.32, 64, 64);
        const glowMaterial = new THREE.MeshBasicMaterial({
            color: 0xaa5533,
            transparent: true,
            opacity: 0.13,
            blending: THREE.AdditiveBlending,
            side: THREE.BackSide
        });
        const glowHalo = new THREE.Mesh(glowHaloGeo, glowMaterial);
        scene.add(glowHalo);
        
        // --- Accretion Disk (Horizontal) ---
        // Create high-res texture with dust-like turbulent gradients
        const createDiskTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const maxRadius = canvas.width / 2;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Radial gradient: hot inside, cooler outside
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, maxRadius);
            gradient.addColorStop(0, 'rgba(255, 100, 30, 0)');
            gradient.addColorStop(0.2, 'rgba(255, 90, 45, 0.98)');
            gradient.addColorStop(0.38, 'rgba(255, 140, 60, 0.92)');
            gradient.addColorStop(0.55, 'rgba(210, 90, 80, 0.88)');
            gradient.addColorStop(0.75, 'rgba(150, 70, 110, 0.75)');
            gradient.addColorStop(0.9, 'rgba(80, 50, 120, 0.5)');
            gradient.addColorStop(1, 'rgba(40, 30, 80, 0)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Add dust particles and streaks
            for (let i = 0; i < 4000; i++) {
                const angle = Math.random() * Math.PI * 2;
                const rad = maxRadius * (0.25 + Math.random() * 0.7);
                const x = centerX + Math.cos(angle) * rad;
                const y = centerY + Math.sin(angle) * rad;
                const alpha = Math.random() * 0.45;
                const r = 200 + Math.random() * 100;
                const g = 90 + Math.random() * 100;
                const b = 50 + Math.random() * 100;
                ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
                ctx.fillRect(x, y, 2 + Math.random() * 3, 2 + Math.random() * 3);
            }
            
            // Lighter streaks to simulate gas turbulence
            ctx.globalCompositeOperation = 'lighter';
            for (let i = 0; i < 1200; i++) {
                const angle = Math.random() * Math.PI * 2;
                const rad = maxRadius * (0.3 + Math.random() * 0.6);
                const x = centerX + Math.cos(angle) * rad;
                const y = centerY + Math.sin(angle) * rad;
                ctx.beginPath();
                ctx.arc(x, y, 1.5 + Math.random() * 4, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 180, 80, ${0.25 + Math.random() * 0.4})`;
                ctx.fill();
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(2.5, 1);
            texture.needsUpdate = true;
            return texture;
        };
        
        const diskTexture = createDiskTexture();
        const diskGeometry = new THREE.RingGeometry(1.35, 4.9, 160, 80);
        const diskMaterial = new THREE.MeshStandardMaterial({
            map: diskTexture,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.97,
            emissive: 0xff5522,
            emissiveIntensity: 0.85,
            roughness: 0.4,
            metalness: 0.65
        });
        
        const accretionDisk = new THREE.Mesh(diskGeometry, diskMaterial);
        accretionDisk.rotation.x = 0;          // Horizontal disk
        accretionDisk.rotation.z = 0;
        scene.add(accretionDisk);
        
        // Outer rim glow (horizontal)
        const rimGlowGeo = new THREE.TorusGeometry(4.45, 0.06, 64, 300);
        const rimMaterial = new THREE.MeshStandardMaterial({
            color: 0xff8844,
            emissive: 0xff4422,
            emissiveIntensity: 1.0,
            transparent: true,
            blending: THREE.AdditiveBlending
        });
        const rimGlow = new THREE.Mesh(rimGlowGeo, rimMaterial);
        rimGlow.rotation.x = 0;
        scene.add(rimGlow);
        
        // --- Dust Particle Systems (swirling in the disk plane) ---
        
        // 1. Main dust particles (dense, many)
        const dustCount = 12000;
        const dustPositions = new Float32Array(dustCount * 3);
        const dustColors = new Float32Array(dustCount * 3);
        for (let i = 0; i < dustCount; i++) {
            const radius = 1.45 + Math.random() * 3.6;
            const angle = Math.random() * Math.PI * 2;
            // Slight vertical offset to give volume (dust clouds)
            const yOffset = (Math.random() - 0.5) * 0.22 * (radius / 3.5);
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            dustPositions[i*3] = x;
            dustPositions[i*3+1] = yOffset;
            dustPositions[i*3+2] = z;
            
            // Color: inner orange, outer blue/purple
            const t = (radius - 1.4) / 3.8;
            const r = 1.0 - t * 0.6;
            const g = 0.5 + Math.random() * 0.5 - t * 0.3;
            const b = 0.3 + t * 0.7;
            dustColors[i*3] = r;
            dustColors[i*3+1] = g;
            dustColors[i*3+2] = b;
        }
        const dustGeo = new THREE.BufferGeometry();
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
        dustGeo.setAttribute('color', new THREE.BufferAttribute(dustColors, 3));
        const dustMat = new THREE.PointsMaterial({
            size: 0.042,
            vertexColors: true,
            transparent: true,
            blending: THREE.AdditiveBlending,
            opacity: 0.7
        });
        const dustSystem = new THREE.Points(dustGeo, dustMat);
        scene.add(dustSystem);
        
        // 2. Hot inner particles (faster, denser)
        const hotCount = 6500;
        const hotPositions = new Float32Array(hotCount * 3);
        for (let i = 0; i < hotCount; i++) {
            const radius = 1.35 + Math.random() * 1.6;
            const angle = Math.random() * Math.PI * 2;
            const yOff = (Math.random() - 0.5) * 0.18;
            hotPositions[i*3] = Math.cos(angle) * radius;
            hotPositions[i*3+1] = yOff;
            hotPositions[i*3+2] = Math.sin(angle) * radius;
        }
        const hotGeo = new THREE.BufferGeometry();
        hotGeo.setAttribute('position', new THREE.BufferAttribute(hotPositions, 3));
        const hotMat = new THREE.PointsMaterial({
            color: 0xff7744,
            size: 0.028,
            blending: THREE.AdditiveBlending,
            transparent: true,
            opacity: 0.85
        });
        const hotParticles = new THREE.Points(hotGeo, hotMat);
        scene.add(hotParticles);
        
        // 3. Streamers / fast-moving particles (dust streaks)
        const streamCount = 4500;
        const streamPositions = new Float32Array(streamCount * 3);
        for (let i = 0; i < streamCount; i++) {
            const radius = 1.8 + Math.random() * 2.8;
            const angle = Math.random() * Math.PI * 2;
            const yOff = (Math.random() - 0.5) * 0.25;
            streamPositions[i*3] = Math.cos(angle) * radius;
            streamPositions[i*3+1] = yOff;
            streamPositions[i*3+2] = Math.sin(angle) * radius;
        }
        const streamGeo = new THREE.BufferGeometry();
        streamGeo.setAttribute('position', new THREE.BufferAttribute(streamPositions, 3));
        const streamMat = new THREE.PointsMaterial({
            color: 0xffaa77,
            size: 0.032,
            transparent: true,
            blending: THREE.AdditiveBlending,
            opacity: 0.55
        });
        const streamParticles = new THREE.Points(streamGeo, streamMat);
        scene.add(streamParticles);
        
        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x111122);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffccaa, 0.85);
        mainLight.position.set(2, 5, 3);
        scene.add(mainLight);
        
        const backLight = new THREE.PointLight(0xff6633, 0.8);
        backLight.position.set(-1, 1.8, -3);
        scene.add(backLight);
        
        const coreGlowLight = new THREE.PointLight(0xff5500, 1.3, 12);
        coreGlowLight.position.set(0, 0.1, 0);
        scene.add(coreGlowLight);
        
        const fillLight = new THREE.PointLight(0x3366aa, 0.5);
        fillLight.position.set(0, -1.2, 0);
        scene.add(fillLight);
        
        const pulseLight = new THREE.PointLight(0xff8844, 0.9);
        pulseLight.position.set(0.8, 0.3, 0.8);
        scene.add(pulseLight);
        
        // --- Distortion shader sphere (subtle lensing) ---
        const distortGeo = new THREE.SphereGeometry(1.48, 64, 64);
        const distortMat = new THREE.ShaderMaterial({
            uniforms: { time: { value: 0 }, glowColor: { value: new THREE.Color(0xaa5533) } },
            vertexShader: `
                varying vec3 vPosition;
                void main() {
                    vPosition = position;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = 1.0;
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform vec3 glowColor;
                uniform float time;
                varying vec3 vPosition;
                void main() {
                    float alpha = 0.07 + sin(vPosition.x * 10.0 + time) * 0.02;
                    alpha += cos(vPosition.z * 9.0 + time * 1.2) * 0.02;
                    alpha = clamp(alpha, 0.04, 0.13);
                    gl_FragColor = vec4(glowColor, alpha);
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            side: THREE.BackSide
        });
        const distortionSphere = new THREE.Mesh(distortGeo, distortMat);
        scene.add(distortionSphere);
        
        // --- Animation Variables ---
        let time = 0;
        const diskRotationSpeed = 0.011;   // Smooth, realistic rotation
        const dustRotationSpeed = 0.0085;
        
        // --- Star rotation ---
        function animateStars() {
            stars.rotation.y += 0.0002;
            stars.rotation.x += 0.0001;
            stars2.rotation.y -= 0.00015;
        }
        
        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            // Rotate the horizontal disk (around Y axis) – natural swirling motion
            accretionDisk.rotation.y += diskRotationSpeed;
            rimGlow.rotation.y += diskRotationSpeed * 0.95;
            
            // Rotate all particle systems in the same direction to simulate dust flow
            dustSystem.rotation.y += dustRotationSpeed;
            hotParticles.rotation.y += dustRotationSpeed * 1.1;
            streamParticles.rotation.y += dustRotationSpeed * 0.9;
            
            // Pulsing effects
            const intensityPulse = 0.9 + Math.sin(time * 3.5) * 0.4;
            coreGlowLight.intensity = intensityPulse;
            pulseLight.intensity = 0.7 + Math.sin(time * 2.8) * 0.5;
            
            // Photon ring animation
            photonMaterial.emissiveIntensity = 0.95 + Math.sin(time * 9) * 0.35;
            photonRing.rotation.z += 0.012;
            
            // Distortion shader time
            if (distortMat.uniforms) distortMat.uniforms.time.value = time;
            
            // Starfield motion
            animateStars();
            
            // Halo gentle rotation
            glowHalo.rotation.y += 0.0008;
            glowHalo.rotation.x = Math.sin(time * 0.15) * 0.05;
            
            controls.update();
            effectComposer.render();
        }
        
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            effectComposer.setSize(window.innerWidth, window.innerHeight);
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        animate();
        console.log('Gargantua with horizontal accretion disk & dust particles – ready.');
    </script>
</body>
</html>
