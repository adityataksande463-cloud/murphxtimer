<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gargantua - Cinematic Black Hole | Pure Immersion</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
        #controls-note {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.3);
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(4px);
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        body { animation: fadeIn 2s ease; }
    </style>
</head>
<body>
    <div id="controls-note">
        🖱️ Drag to orbit | Scroll to zoom
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // --- Setup Scene, Camera, Renderer ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010008);
        scene.fog = new THREE.FogExp2(0x010008, 0.0003);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5.5, 2.5, 7.2);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.5;
        document.body.appendChild(renderer.domElement);

        // --- Post Processing: Bloom for intense glow ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.6, 0.85);
        bloomPass.threshold = 0.05;
        bloomPass.strength = 1.4;
        bloomPass.radius = 0.8;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);

        // --- Controls with cinematic auto-rotation (very slow) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.3;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.0;
        controls.rotateSpeed = 0.8;
        controls.target.set(0, 0.1, 0);

        // ========== 1. BACKGROUND: Deep starfield ==========
        const starCount = 8000;
        const starGeometry = new THREE.BufferGeometry();
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            const radius = 200 + Math.random() * 500;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starPositions[i*3] = radius * Math.sin(phi) * Math.cos(theta);
            starPositions[i*3+1] = radius * Math.sin(phi) * Math.sin(theta);
            starPositions[i*3+2] = radius * Math.cos(phi);
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);

        const brightStarCount = 2000;
        const brightStarGeo = new THREE.BufferGeometry();
        const brightPos = new Float32Array(brightStarCount * 3);
        for (let i = 0; i < brightStarCount; i++) {
            brightPos[i*3] = (Math.random() - 0.5) * 600;
            brightPos[i*3+1] = (Math.random() - 0.5) * 400;
            brightPos[i*3+2] = (Math.random() - 0.5) * 300 - 100;
        }
        brightStarGeo.setAttribute('position', new THREE.BufferAttribute(brightPos, 3));
        const brightStarMat = new THREE.PointsMaterial({ color: 0xffeedd, size: 0.28, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.9 });
        const brightStars = new THREE.Points(brightStarGeo, brightStarMat);
        scene.add(brightStars);

        // ========== 2. BLACK HOLE CORE & PHOTON RING ==========
        const coreGeo = new THREE.SphereGeometry(0.96, 256, 256);
        const coreMat = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.1, metalness: 0.98, emissive: 0x1a0500, emissiveIntensity: 0.3 });
        const blackHole = new THREE.Mesh(coreGeo, coreMat);
        scene.add(blackHole);

        const photonRingGeo = new THREE.TorusGeometry(1.07, 0.045, 128, 240);
        const photonMat = new THREE.MeshStandardMaterial({ color: 0xff7733, emissive: 0xff4411, emissiveIntensity: 1.6, transparent: true, blending: THREE.AdditiveBlending });
        const photonRing = new THREE.Mesh(photonRingGeo, photonMat);
        scene.add(photonRing);

        // Gravitational halo
        const haloGeo = new THREE.SphereGeometry(1.42, 64, 64);
        const haloMat = new THREE.MeshBasicMaterial({ color: 0xaa5533, transparent: true, opacity: 0.16, blending: THREE.AdditiveBlending, side: THREE.BackSide });
        const halo = new THREE.Mesh(haloGeo, haloMat);
        scene.add(halo);

        // ========== 3. GRAVITATIONAL LENSING SHADER (Sphere that distorts background) ==========
        const lensingUniforms = {
            time: { value: 0 },
            distortionStrength: { value: 0.85 }
        };
        const lensingVertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = 1.0;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;
        const lensingFragmentShader = `
            uniform float time;
            uniform float distortionStrength;
            varying vec2 vUv;
            void main() {
                vec2 uv = vUv;
                vec2 centered = uv * 2.0 - 1.0;
                float r = length(centered);
                float distortion = distortionStrength * (1.0 - smoothstep(0.0, 0.8, r));
                vec2 offset = centered * distortion;
                vec2 finalUv = uv + offset * 0.15;
                float alpha = 0.12 + sin(r * 20.0 - time * 5.0) * 0.04;
                alpha = clamp(alpha, 0.07, 0.22);
                gl_FragColor = vec4(0.9, 0.4, 0.2, alpha);
            }
        `;
        const lensingSphereGeo = new THREE.SphereGeometry(1.65, 128, 128);
        const lensingMat = new THREE.ShaderMaterial({
            uniforms: lensingUniforms,
            vertexShader: lensingVertexShader,
            fragmentShader: lensingFragmentShader,
            transparent: true,
            blending: THREE.AdditiveBlending,
            side: THREE.BackSide
        });
        const lensingSphere = new THREE.Mesh(lensingSphereGeo, lensingMat);
        scene.add(lensingSphere);

        // ========== 4. ACCRETION DISK (Particle system with relativistic beaming) ==========
        const particleCount = 24000;
        const particlePositions = new Float32Array(particleCount * 3);
        const particleColors = new Float32Array(particleCount * 3);
        const particleSpeeds = new Float32Array(particleCount);
        const innerR = 1.28;
        const outerR = 5.4;
        for (let i = 0; i < particleCount; i++) {
            const r = innerR + Math.pow(Math.random(), 1.6) * (outerR - innerR);
            const angle = Math.random() * Math.PI * 2;
            const thickness = 0.12 * (r / outerR) * 1.4;
            const y = (Math.random() - 0.5) * thickness;
            particlePositions[i*3] = Math.cos(angle) * r;
            particlePositions[i*3+1] = y;
            particlePositions[i*3+2] = Math.sin(angle) * r;
            const t = (r - innerR) / (outerR - innerR);
            const angleSide = Math.cos(angle);
            const brightness = 0.7 + angleSide * 0.3;
            particleColors[i*3] = Math.min(1.0, (1.0 - t * 0.5) * brightness);
            particleColors[i*3+1] = Math.min(1.0, (0.5 + Math.random() * 0.4 - t * 0.2) * brightness);
            particleColors[i*3+2] = Math.min(1.0, (0.2 + t * 0.8) * brightness);
            particleSpeeds[i] = 0.022 * Math.pow(r, -1.5);
        }
        const particleGeo = new THREE.BufferGeometry();
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
        const particleMat = new THREE.PointsMaterial({ size: 0.042, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending, opacity: 0.85 });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);

        // Additional hot inner particles
        const hotCount = 10000;
        const hotPos = new Float32Array(hotCount * 3);
        const hotSpeeds = new Float32Array(hotCount);
        for (let i = 0; i < hotCount; i++) {
            const r = innerR + Math.random() * 1.9;
            const angle = Math.random() * Math.PI * 2;
            const y = (Math.random() - 0.5) * 0.08;
            hotPos[i*3] = Math.cos(angle) * r;
            hotPos[i*3+1] = y;
            hotPos[i*3+2] = Math.sin(angle) * r;
            hotSpeeds[i] = 0.03 * Math.pow(r, -1.5);
        }
        const hotGeo = new THREE.BufferGeometry();
        hotGeo.setAttribute('position', new THREE.BufferAttribute(hotPos, 3));
        const hotMat = new THREE.PointsMaterial({ color: 0xff8844, size: 0.03, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.9 });
        const hotParticles = new THREE.Points(hotGeo, hotMat);
        scene.add(hotParticles);

        // Outer faint dust
        const outerCount = 12000;
        const outerPos = new Float32Array(outerCount * 3);
        const outerSpeeds = new Float32Array(outerCount);
        for (let i = 0; i < outerCount; i++) {
            const r = 3.0 + Math.random() * 2.8;
            const angle = Math.random() * Math.PI * 2;
            const y = (Math.random() - 0.5) * 0.25;
            outerPos[i*3] = Math.cos(angle) * r;
            outerPos[i*3+1] = y;
            outerPos[i*3+2] = Math.sin(angle) * r;
            outerSpeeds[i] = 0.009 * Math.pow(r, -1.4);
        }
        const outerGeo = new THREE.BufferGeometry();
        outerGeo.setAttribute('position', new THREE.BufferAttribute(outerPos, 3));
        const outerMat = new THREE.PointsMaterial({ color: 0xaa88cc, size: 0.05, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.55 });
        const outerDust = new THREE.Points(outerGeo, outerMat);
        scene.add(outerDust);

        // Store angles for per-particle rotation
        const anglesMain = new Array(particleCount);
        const anglesHot = new Array(hotCount);
        const anglesOuter = new Array(outerCount);
        for (let i = 0; i < particleCount; i++) anglesMain[i] = Math.atan2(particlePositions[i*3+2], particlePositions[i*3]);
        for (let i = 0; i < hotCount; i++) anglesHot[i] = Math.atan2(hotPos[i*3+2], hotPos[i*3]);
        for (let i = 0; i < outerCount; i++) anglesOuter[i] = Math.atan2(outerPos[i*3+2], outerPos[i*3]);

        function updateParticleSystem(positions, speeds, angles, count, attr) {
            for (let i = 0; i < count; i++) {
                angles[i] += speeds[i] * 0.016;
                const r = Math.hypot(positions[i*3], positions[i*3+2]);
                const newX = Math.cos(angles[i]) * r;
                const newZ = Math.sin(angles[i]) * r;
                positions[i*3] = newX;
                positions[i*3+2] = newZ;
            }
            attr.needsUpdate = true;
        }
        const mainAttr = particleGeo.attributes.position;
        const hotAttr = hotGeo.attributes.position;
        const outerAttr = outerGeo.attributes.position;

        // ========== 5. SPIRAL ACCRETION STREAM (Particles falling in) ==========
        const streamCount = 4000;
        const streamPositions = new Float32Array(streamCount * 3);
        const streamAngles = new Array(streamCount);
        const streamRadii = new Array(streamCount);
        const streamSpeeds = new Array(streamCount);
        for (let i = 0; i < streamCount; i++) {
            const r = 3.5 + Math.random() * 2.0;
            const angle = Math.random() * Math.PI * 2;
            streamPositions[i*3] = Math.cos(angle) * r;
            streamPositions[i*3+1] = (Math.random() - 0.5) * 0.2;
            streamPositions[i*3+2] = Math.sin(angle) * r;
            streamAngles[i] = angle;
            streamRadii[i] = r;
            streamSpeeds[i] = 0.018 * Math.pow(r, -1.3);
        }
        const streamGeo = new THREE.BufferGeometry();
        streamGeo.setAttribute('position', new THREE.BufferAttribute(streamPositions, 3));
        const streamMat = new THREE.PointsMaterial({ color: 0xffaa66, size: 0.055, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.9 });
        const stream = new THREE.Points(streamGeo, streamMat);
        scene.add(stream);
        const streamAttr = streamGeo.attributes.position;

        // ========== 6. PLANET CONSUMPTION SIMULATION ==========
        const planetGroup = new THREE.Group();
        const planetGeo = new THREE.SphereGeometry(0.38, 64, 64);
        const planetMat = new THREE.MeshStandardMaterial({ color: 0xaa8866, roughness: 0.6, metalness: 0.2, emissive: 0x442200, emissiveIntensity: 0.3 });
        const planet = new THREE.Mesh(planetGeo, planetMat);
        planetGroup.add(planet);
        const atmosGeo = new THREE.SphereGeometry(0.42, 32, 32);
        const atmosMat = new THREE.MeshBasicMaterial({ color: 0xccaa88, transparent: true, opacity: 0.25, blending: THREE.AdditiveBlending });
        const atmosphere = new THREE.Mesh(atmosGeo, atmosMat);
        planetGroup.add(atmosphere);
        scene.add(planetGroup);
        
        let planetAngle = 0;
        let planetRadius = 4.2;
        let planetConsumed = false;
        const consumeStart = 5;
        let consumeProgress = 0;
        
        const debrisCount = 800;
        const debrisPositions = new Float32Array(debrisCount * 3);
        for (let i = 0; i < debrisCount; i++) {
            debrisPositions[i*3] = 0;
            debrisPositions[i*3+1] = 0;
            debrisPositions[i*3+2] = 0;
        }
        const debrisGeo = new THREE.BufferGeometry();
        debrisGeo.setAttribute('position', new THREE.BufferAttribute(debrisPositions, 3));
        const debrisMat = new THREE.PointsMaterial({ color: 0xffaa77, size: 0.045, blending: THREE.AdditiveBlending });
        const debris = new THREE.Points(debrisGeo, debrisMat);
        scene.add(debris);
        
        // ========== 7. LIGHTING ==========
        const ambient = new THREE.AmbientLight(0x111122);
        scene.add(ambient);
        const mainLight = new THREE.DirectionalLight(0xffccaa, 1.0);
        mainLight.position.set(2, 4, 3);
        scene.add(mainLight);
        const backLight = new THREE.PointLight(0xff6644, 0.9);
        backLight.position.set(-1.5, 1.2, -3.5);
        scene.add(backLight);
        const coreLight = new THREE.PointLight(0xff5500, 1.3, 14);
        coreLight.position.set(0, 0.1, 0);
        scene.add(coreLight);
        const fillLight = new THREE.PointLight(0x4477aa, 0.7);
        fillLight.position.set(0, -1.2, 0);
        scene.add(fillLight);
        const rimLight = new THREE.PointLight(0xff8844, 0.9);
        rimLight.position.set(1.2, 1.5, -2.2);
        scene.add(rimLight);
        
        // ========== 8. ADDITIONAL GLOW MESHES ==========
        const glowRingGeo = new THREE.RingGeometry(1.35, 5.2, 180, 90);
        const glowRingMat = new THREE.MeshStandardMaterial({ color: 0xff7733, emissive: 0xff5522, emissiveIntensity: 0.8, transparent: true, opacity: 0.45, side: THREE.DoubleSide, blending: THREE.AdditiveBlending });
        const glowRing = new THREE.Mesh(glowRingGeo, glowRingMat);
        glowRing.rotation.x = 0;
        scene.add(glowRing);
        
        const outerRingGeo = new THREE.TorusGeometry(4.9, 0.07, 64, 300);
        const outerRingMat = new THREE.MeshStandardMaterial({ color: 0xff8866, emissive: 0xff4422, emissiveIntensity: 0.7, transparent: true, blending: THREE.AdditiveBlending });
        const outerRing = new THREE.Mesh(outerRingGeo, outerRingMat);
        outerRing.rotation.x = 0;
        scene.add(outerRing);
        
        // ========== 9. ANIMATION LOOP ==========
        let time = 0;
        let lastTimestamp = performance.now();
        
        function animate() {
            const now = performance.now();
            let dt = Math.min(0.033, (now - lastTimestamp) / 1000);
            lastTimestamp = now;
            time += dt;
            
            updateParticleSystem(mainAttr.array, particleSpeeds, anglesMain, particleCount, mainAttr);
            updateParticleSystem(hotAttr.array, hotSpeeds, anglesHot, hotCount, hotAttr);
            updateParticleSystem(outerAttr.array, outerSpeeds, anglesOuter, outerCount, outerAttr);
            
            for (let i = 0; i < streamCount; i++) {
                streamRadii[i] -= 0.008 * dt * 30;
                if (streamRadii[i] < 1.1) {
                    streamRadii[i] = 3.2 + Math.random() * 1.5;
                    streamAngles[i] = Math.random() * Math.PI * 2;
                }
                streamAngles[i] += streamSpeeds[i] * dt * 30;
                const x = Math.cos(streamAngles[i]) * streamRadii[i];
                const z = Math.sin(streamAngles[i]) * streamRadii[i];
                streamPositions[i*3] = x;
                streamPositions[i*3+2] = z;
                streamPositions[i*3+1] = Math.sin(streamAngles[i] * 5) * 0.05;
            }
            streamAttr.needsUpdate = true;
            
            if (!planetConsumed && time > consumeStart) {
                consumeProgress = Math.min(1.0, (time - consumeStart) / 5.0);
                planetRadius = 4.2 * (1 - consumeProgress * 0.85);
                if (planetRadius < 1.3) planetRadius = 1.3;
                planetAngle += 0.025 * (1 + consumeProgress * 2);
                const xPlanet = Math.cos(planetAngle) * planetRadius;
                const zPlanet = Math.sin(planetAngle) * planetRadius;
                planetGroup.position.set(xPlanet, Math.sin(planetAngle * 3) * 0.08, zPlanet);
                const stretch = 1 + consumeProgress * 1.5;
                planet.scale.set(1, 1 - consumeProgress * 0.6, stretch);
                atmosphere.scale.set(1, 1 - consumeProgress * 0.6, stretch);
                const hotness = consumeProgress;
                planetMat.color.setHSL(0.08, 1.0, 0.3 + hotness * 0.3);
                planetMat.emissiveIntensity = hotness * 0.8;
                if (consumeProgress > 0.2 && consumeProgress < 0.9) {
                    for (let i = 0; i < debrisCount; i++) {
                        if (Math.random() < 0.15) {
                            const dir = new THREE.Vector3(Math.random() - 0.5, Math.random() - 0.5, Math.random() - 0.5).normalize();
                            const speed = 0.03 + Math.random() * 0.07;
                            debrisPositions[i*3] = planetGroup.position.x + dir.x * 0.6;
                            debrisPositions[i*3+1] = planetGroup.position.y + dir.y * 0.6;
                            debrisPositions[i*3+2] = planetGroup.position.z + dir.z * 0.6;
                        } else {
                            debrisPositions[i*3] += (Math.random() - 0.5) * 0.04;
                            debrisPositions[i*3+1] += (Math.random() - 0.5) * 0.04;
                            debrisPositions[i*3+2] += (Math.random() - 0.5) * 0.04;
                        }
                    }
                    debrisGeo.attributes.position.needsUpdate = true;
                }
                if (consumeProgress >= 0.98) {
                    planetGroup.visible = false;
                    debris.visible = false;
                    planetConsumed = true;
                }
            } else if (!planetConsumed && time < consumeStart) {
                planetAngle += 0.008;
                planetRadius = 4.2;
                const xPlanet = Math.cos(planetAngle) * planetRadius;
                const zPlanet = Math.sin(planetAngle) * planetRadius;
                planetGroup.position.set(xPlanet, Math.sin(planetAngle * 2) * 0.1, zPlanet);
                planet.scale.set(1,1,1);
                atmosphere.scale.set(1,1,1);
                planetMat.color.setHex(0xaa8866);
                planetMat.emissiveIntensity = 0.2;
            }
            
            const pulse = 0.8 + Math.sin(time * 3.2) * 0.4;
            coreLight.intensity = pulse * 1.2;
            rimLight.intensity = 0.7 + Math.sin(time * 2.5) * 0.4;
            photonMat.emissiveIntensity = 1.1 + Math.sin(time * 8) * 0.5;
            photonRing.rotation.z += 0.012;
            
            glowRing.rotation.y += 0.007;
            outerRing.rotation.y += 0.006;
            lensingUniforms.time.value = time;
            
            stars.rotation.y += 0.0001;
            brightStars.rotation.x += 0.00005;
            
            controls.update();
            effectComposer.render();
            requestAnimationFrame(animate);
        }
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            effectComposer.setSize(window.innerWidth, window.innerHeight);
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        animate();
    </script>
</body>
    </html>
